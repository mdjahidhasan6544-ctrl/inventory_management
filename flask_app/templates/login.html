{% extends "base.html" %}
{% block title %}Login{% endblock %}
{% block auth_content %}
<div class="auth-card">
    <div class="auth-logo">
        <div class="logo-icon">
            <i class="fas fa-boxes-stacked"></i>
        </div>
        <h2>InventoryPro</h2>
        <p>Sign in to your account</p>
    </div>

    <form class="auth-form" method="POST" action="{{ url_for('login') }}">
        <div class="form-group">
            <label class="form-label" for="username">Username</label>
            <input type="text" class="form-input" id="username" name="username" placeholder="Enter your username" required autofocus>
        </div>
        <div class="form-group">
            <label class="form-label" for="password">Password</label>
            <input type="password" class="form-input" id="password" name="password" placeholder="Enter your password" required>
        </div>
        <button type="submit" class="btn btn-primary auth-submit" id="btn-login">
            <i class="fas fa-right-to-bracket"></i>
            Sign In
        </button>
    </form>

    <div class="auth-divider">or</div>

    <div class="auth-footer">
        Don't have an account? <a href="{{ url_for('register') }}">Create one</a>
    </div>

    <div style="margin-top: 20px; padding: 14px; background: var(--bg-tertiary); border-radius: var(--radius-md); text-align: center;">
        <p style="font-size: 12px; color: var(--text-muted); margin-bottom: 4px;">Demo Credentials</p>
        <p style="font-size: 13px; color: var(--text-secondary);"><strong>admin</strong> / <strong>admin123</strong></p>
    </div>
</div>
{% endblock %}
